<div class="container-fluid auth-bg-shelter">
  <div class="row justify-content-center align-items-center min-vh-100">
    <div class="col-12 col-sm-10 col-md-8 col-lg-5">
      <div class="auth-wrapper position-relative">

        <div class="profile-circle">
          <i class="bi bi-person-fill"></i>
        </div>

        <div class="card auth-card p-4">
          <div class="text-center mb-3">
            <h1 class="shelter-title mt-2">Bienvenid&#64; a Huellas Conectadas</h1>
            <p class="shelter-tagline">Tu apoyo nos ayuda a cuidarles</p>
          </div>

          <p *ngIf="infoMessage" class="alert alert-info" role="alert" aria-live="polite">
            {{ infoMessage }}
          </p>

          <form [formGroup]="form" (ngSubmit)="onLogin()" novalidate>
            <div class="mb-3 form-group input-custom">
              <div class="input-icon">
                <i class="bi bi-person-fill"></i>
              </div>
              <input id="email" formControlName="email" type="email" class="form-control-custom" placeholder="Email ID"
                [class.is-invalid]="
                  form.get('email')?.invalid && form.get('email')?.touched
                " aria-describedby="emailHelp" />
            </div>
            <div id="emailHelp" class="invalid-feedback mb-3"
              *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
              Introduce un e-mail válido.
            </div>

            <div class="mb-3 form-group input-custom position-relative">
              <div class="input-icon">
                <i class="bi bi-lock-fill"></i>
              </div>
              <input id="password" formControlName="password" [type]="showPassword ? 'text' : 'password'"
                class="form-control-custom" placeholder="Password" [class.is-invalid]="
                  form.get('password')?.invalid && form.get('password')?.touched
                " aria-describedby="pwdHelp" />
              <button type="button" class="btn btn-sm btn-pass-toggle" (click)="togglePassword()" [attr.aria-label]="
                  showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'
                ">
                <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
              </button>
            </div>
            <div id="pwdHelp" class="invalid-feedback mb-3"
              *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
              La contraseña es obligatoria.
            </div>

            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-auth" [disabled]="form.invalid || loading" aria-live="polite">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status"
                  aria-hidden="true"></span>
                Entrar
              </button>
            </div>
          </form>

          <div class="mt-3 text-center">
            <a routerLink="/registro" class="link-secondary">¿No tienes cuenta? Regístrate</a>
            <br />
            <a routerLink="/recuperar" class="link-secondary">¿Olvidaste tu contraseña?</a>
          </div>
        </div>

        <div class="login-tag">LOGIN</div>
      </div>
    </div>
  </div>
</div>
